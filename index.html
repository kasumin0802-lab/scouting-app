<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本格スカウティングアプリ</title>
<style>
    body { 
        font-family: 'Helvetica Neue', Arial, sans-serif; 
        text-align: center; 
        background-color: #f0f2f5; 
        padding: 20px; 
        color: #333;
    }
    h1 { font-size: 24px; margin-bottom: 5px; }
    p.instruction { color: #666; font-size: 14px; margin-bottom: 20px; }
    
    .section {
        background: white; border-radius: 12px; padding: 20px;
        margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    .section-title {
        font-size: 20px; font-weight: bold; margin-bottom: 15px;
        text-align: left; padding-left: 10px; border-left: 5px solid #ccc;
    }
    
    .attack .section-title { border-color: #e74c3c; color: #e74c3c; }
    .defense .section-title { border-color: #3498db; color: #3498db; }
    .misc .section-title { border-color: #2ecc71; color: #2ecc71; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
    
    .box { background: #fafafa; padding: 15px 10px; border-radius: 8px; border: 1px solid #eee; }
    .box-title { font-size: 13px; font-weight: bold; margin-bottom: 8px; height: 30px; display: flex; align-items: center; justify-content: center; }
    .key-badge { font-size: 12px; font-weight: bold; background: #333; color: white; padding: 3px 8px; border-radius: 4px; display: inline-block; margin-bottom: 10px; }
    
    .counter-area { display: flex; align-items: center; justify-content: center; gap: 10px; }
    .count { font-size: 28px; font-weight: bold; width: 40px; }
    .btn { background: #ddd; border: none; font-size: 18px; font-weight: bold; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; color: #555; }
    .btn:hover { background: #ccc; }

    .action-area { margin-top: 30px; display: flex; justify-content: center; gap: 20px; }
    .action-btn { padding: 15px 30px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; }
    .reset-btn { background-color: #95a5a6; color: white; }
    .export-btn { background-color: #27ae60; color: white; }
</style>
</head>
<body>

    <h1>本格スカウティングアプリ</h1>
    <p class="instruction">【操作】キーを押すと「+1」 / <b>Shiftキー + キー</b> で「-1」（※半角英数モード）</p>

    <!-- アプリ画面表示エリア -->
    <div id="app"></div>

    <!-- 操作ボタンエリア（ここがExcel保存ボタンです） -->
    <div class="action-area">
        <button class="action-btn export-btn" onclick="exportToCSV()">📊 データをExcel (CSV) で保存</button>
        <button class="action-btn reset-btn" onclick="resetCounts()">🗑️ 全カウント リセット</button>
    </div>

    <script>
        const config = [
            { key: 'q', label: 'パス', category: 'attack' },
            { key: 'w', label: 'パス成功数', category: 'attack' },
            { key: 'e', label: 'ドリブル', category: 'attack' },
            { key: 'r', label: 'ドリブル成功数', category: 'attack' },
            { key: 't', label: 'シュート', category: 'attack' },
            { key: 'y', label: '枠内シュート', category: 'attack' },
            { key: 'u', label: 'タッチ数', category: 'attack' },
            { key: 'i', label: 'チャンスクリエイト', category: 'attack' },
            { key: 'o', label: 'クロス数', category: 'attack' },
            { key: 'p', label: '被ボール奪取', category: 'attack' },
            { key: 'a', label: 'タックル', category: 'defense' },
            { key: 's', label: 'ボール奪取数', category: 'defense' },
            { key: 'd', label: 'インターセプト', category: 'defense' },
            { key: 'f', label: 'ボールリカバリー', category: 'defense' },
            { key: 'g', label: 'ブロック', category: 'defense' },
            { key: 'h', label: 'クリア', category: 'defense' },
            { key: 'j', label: 'ファウル', category: 'defense' },
            { key: 'k', label: '被ファウル数', category: 'defense' },
            { key: 'l', label: '被突破数', category: 'defense' },
            { key: 'z', label: 'デュエル回数', category: 'misc' },
            { key: 'x', label: 'デュエル勝利数', category: 'misc' },
            { key: 'c', label: '空中戦回数', category: 'misc' },
            { key: 'v', label: '空中戦勝利数', category: 'misc' },
            { key: 'b', label: 'ゴール', category: 'misc' },
            { key: 'n', label: 'アシスト', category: 'misc' },
            { key: 'm', label: 'ビッグチャンス失敗', category: 'misc' }
        ];

        let counts = {};

        function buildUI() {
            const app = document.getElementById('app');
            const categories = {
                attack: { title: '攻撃要素', class: 'attack', html: '' },
                defense: { title: '守備要素', class: 'defense', html: '' },
                misc: { title: 'その他', class: 'misc', html: '' }
            };

            config.forEach(item => {
                counts[item.key] = 0;
                categories[item.category].html += `
                    <div class="box" id="box-${item.key}">
                        <div class="box-title">${item.label}</div>
                        <div class="key-badge">${item.key.toUpperCase()} キー</div>
                        <div class="counter-area">
                            <button class="btn" onclick="updateCount('${item.key}', -1)">-</button>
                            <div class="count" id="count-${item.key}">0</div>
                            <button class="btn" onclick="updateCount('${item.key}', 1)">+</button>
                        </div>
                    </div>
                `;
            });

            let finalHtml = '';
            for (let key in categories) {
                finalHtml += `
                    <div class="section ${categories[key].class}">
                        <div class="section-title">${categories[key].title}</div>
                        <div class="grid">${categories[key].html}</div>
                    </div>
                `;
            }
            app.innerHTML = finalHtml;
        }

        function updateCount(key, change) {
            if (counts[key] !== undefined) {
                counts[key] = Math.max(0, counts[key] + change);
                document.getElementById(`count-${key}`).innerText = counts[key];
            }
        }

        document.addEventListener('keydown', function(event) {
            if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA') return;
            const key = event.key.toLowerCase();
            if (counts[key] !== undefined) {
                updateCount(key, event.shiftKey ? -1 : 1);
            }
        });

        function resetCounts() {
            if(confirm('本当にすべてのカウントを「0」にリセットしますか？')) {
                for (let key in counts) {
                    counts[key] = 0;
                    document.getElementById(`count-${key}`).innerText = counts[key];
                }
            }
        }

        function exportToCSV() {
            let csvContent = "カテゴリー,項目名,割り当てキー,回数\n";
            config.forEach(item => {
                let catName = item.category === 'attack' ? '攻撃' : (item.category === 'defense' ? '守備' : 'その他');
                csvContent += `${catName},${item.label},${item.key.toUpperCase()},${counts[item.key]}\n`;
            });

            const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
            const blob = new Blob([bom, csvContent], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            
            const now = new Date();
            const timestamp = `${now.getFullYear()}${('0'+(now.getMonth()+1)).slice(-2)}${('0'+now.getDate()).slice(-2)}_${('0'+now.getHours()).slice(-2)}${('0'+now.getMinutes()).slice(-2)}`;
            a.setAttribute('download', `scouting_data_${timestamp}.csv`);

            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        buildUI();
    </script>
</body>
</html>
