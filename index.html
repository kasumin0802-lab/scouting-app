<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スカウティングアプリ</title>
<style>
    body { 
        font-family: sans-serif; 
        text-align: center; 
        background-color: #f4f4f9; 
        padding: 20px; 
    }
    .container { 
        display: flex; 
        justify-content: center; 
        gap: 20px; 
        flex-wrap: wrap; 
        margin-top: 30px;
    }
    .box { 
        background: white; 
        padding: 20px; 
        border-radius: 10px; 
        box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
        width: 200px; 
    }
    h2 { 
        font-size: 24px; 
        color: #333; 
        margin-bottom: 10px; 
    }
    .count { 
        font-size: 56px; 
        font-weight: bold; 
        color: #007bff; 
    }
    .key { 
        font-size: 14px; 
        color: #666; 
        background: #eee; 
        padding: 4px 8px; 
        border-radius: 4px; 
        display: inline-block;
        margin-bottom: 10px;
    }
    .reset-btn { 
        margin-top: 40px; 
        padding: 12px 30px; 
        font-size: 18px; 
        cursor: pointer; 
        background-color: #dc3545; 
        color: white; 
        border: none; 
        border-radius: 5px;
        transition: background-color 0.3s;
    }
    .reset-btn:hover {
        background-color: #c82333;
    }
</style>
</head>
<body>

    <h1>試合分析・スカウティングアプリ</h1>
    <p>キーボードの対応するキーを押すとカウントが増えます。（※半角英数入力モードでご利用ください）</p>

    <div class="container">
        <div class="box">
            <h2>パス</h2>
            <div class="key">Qキー</div>
            <div id="countQ" class="count">0</div>
        </div>
        <div class="box">
            <h2>パス成功</h2>
            <div class="key">Wキー</div>
            <div id="countW" class="count">0</div>
        </div>
        <div class="box">
            <h2>ドリブル</h2>
            <div class="key">Eキー</div>
            <div id="countE" class="count">0</div>
        </div>
        <div class="box">
            <h2>ドリブル成功</h2>
            <div class="key">Rキー</div>
            <div id="countR" class="count">0</div>
        </div>
    </div>

    <button class="reset-btn" onclick="resetCounts()">全カウント リセット</button>

    <script>
        // カウンターの変数を初期化
        let counts = {
            q: 0,
            w: 0,
            e: 0,
            r: 0
        };

        // キーボードが押された時の処理（イベントリスナー）
        document.addEventListener('keydown', function(event) {
            // 大文字入力・小文字入力のどちらでも反応するように小文字に変換して判定
            const key = event.key.toLowerCase(); 

            if (key === 'q') {
                counts.q++;
                document.getElementById('countQ').innerText = counts.q;
            } else if (key === 'w') {
                counts.w++;
                document.getElementById('countW').innerText = counts.w;
            } else if (key === 'e') {
                counts.e++;
                document.getElementById('countE').innerText = counts.e;
            } else if (key === 'r') {
                counts.r++;
                document.getElementById('countR').innerText = counts.r;
            }
        });

        // リセット機能の処理
        function resetCounts() {
            // 間違えて押した時のために確認メッセージを出す
            if(confirm('本当にすべてのカウントを「0」にリセットしますか？')) {
                counts = { q: 0, w: 0, e: 0, r: 0 };
                document.getElementById('countQ').innerText = counts.q;
                document.getElementById('countW').innerText = counts.w;
                document.getElementById('countE').innerText = counts.e;
                document.getElementById('countR').innerText = counts.r;
            }
        }
    </script>
</body>
</html>
